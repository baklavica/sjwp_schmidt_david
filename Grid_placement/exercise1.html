<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Placement</title>
  <style>
    body {
      padding: 0;
      margin: 0;
    }

    .container {
      height: 100vh;
      display: grid;
      gap: 3rem;
      grid-template-columns: 1fr 1fr 1.5fr;
      grid-template-rows: 1fr 1fr;
    }

    .cowboy {
      background-color: aqua;
      /* grid-column: span 2; */
      grid-column-start: 1;
      grid-column-end: 3;
    }
    .book {
      background-color: purple;
      /* grid-row: span 2; */
      /* grid-column-start: 3;
      grid-column-end: 4;
      grid-row-start: 1;
      grid-row-end: 3; */
      grid-area: 1 / 3 / 3 / 4;
      
    }
    .astronaut {
      background-color: darkcyan;
      order: 1;
      grid-column-start: 1;
      grid-column-end: 3;
    }

    .item {
      font-size: 5rem;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      background-color: blueviolet;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="item cowboy">🤠</div>
    <div class="item book">📖</div>
    <div class="item astronaut">👨‍🚀</div>
    
  </div>
</body>

</html>
