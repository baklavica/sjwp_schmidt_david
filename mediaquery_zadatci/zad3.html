<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            box-sizing: border-box;
        }
        .header {
            background-color: salmon;
            width: 100vw;
            height: 15vh;
            text-align: center;
        }
        .content {
            display: flex;
            width: 100vw;
            height: 70vh;
            text-align: center;
        }
        .left {
            background-color: burlywood;
            width: 15vw;
            height: 100%;
        }
        .main {
            background-color: #fff;
            width: 70vw;
            height: 100%;
        }
        .right {
            background-color: lightgreen;
            width: 15vw;
            height: 100%;
        }
        .footer {
            background-color: skyblue;
            width: 100vw;
            height: 15vh;
            text-align: center;
        }

        @media (max-width: 1024px){
            .content {
                display: grid;
                grid-template-rows: repeat(2, 1fr);
                grid-template-columns: repeat(2, 1fr);
                height: 70vh;
            }
            .main { grid-area: 1 / 1 / 2 / 3; width: 100%;}
            .left { grid-area: 2 / 1 / 3 / 2; width: 100%;}
            .right { grid-area: 2 / 2 / 3 / 3; width: 100%;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">header</div>
        <div class="content">
            <div class="left">left</div>
            <div class="main">main</div>
            <div class="right">right</div>
        </div>
        
        <div class="footer">footer</div>
    </div>
</body>
</html>
