<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            box-sizing: border-box;
        }
        .orange1, .orange2 { background-color: lightsalmon;}
        .green {background-color: greenyellow;}
        .blue-container { 
            display: grid;
            grid-template-rows: 1fr;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .blue { background-color: darkblue; }
        .grey1, .grey2, .grey3, .grey4 { background-color: #ccc;}

        .container {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            height: 100vh;
        }
        .orange1 {
            grid-area: 1 / 1 / 2 / 3;
        }
        .orange2 {
            grid-area: 1 / 3 / 2 / 5;
        }
        .green {
            grid-area: 2 / 1 / 5 / 5;
        }
        .blue-container {
            grid-area: 5 / 1 / 7 / 5;
        }
        .grey1 { grid-area: 7 / 1 / 8 / 2;}
        .grey2 { grid-area: 7 / 2 / 8 / 3;}
        .grey3 { grid-area: 7 / 3 / 8 / 4;}
        .grey4 { grid-area: 7 / 4 / 8 / 5;}
       
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(8, 1fr);
                height: 100vh;
                gap: 10px;

            }
            .orange1 { grid-area: 1 / 1 / 2 / 3; }
            .orange2 { grid-area: 2 / 1 / 3 / 3; }
            .green    { grid-area: 3 / 1 / 5 / 3; }

            .blue-container {
                grid-area: 5 / 1 / 7 / 3;
                grid-template-rows: repeat(3, 1fr);
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .grey1 { grid-area: 7 / 1 / 8 / 2; }
            .grey2 { grid-area: 7 / 2 / 8 / 3; }
            .grey3 { grid-area: 8 / 1 / 9 / 2; }
            .grey4 { grid-area: 8 / 2 / 9 / 3; }
        }
        
        @media (max-width: 320px) {
            .container {
                grid-template-rows: repeat(7, 1fr);
                grid-template-columns: 1fr;
                height: 100vh;
                gap: 10px;
            }
            .blue-container {
                grid-template-rows: repeat(3, 1fr);
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .grey1 { grid-area: 7 / 1 / 9 / 3;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="orange1"></div>
        <div class="orange2"></div>
        <div class="green"></div>
        <div class="blue-container">
            <div class="blue"></div>
            <div class="blue"></div>
            <div class="blue"></div>
        </div>
        <div class="grey1"></div>
        <div class="grey2"></div>
        <div class="grey3"></div>
        <div class="grey4"></div>
    </div>
</body>
</html>
