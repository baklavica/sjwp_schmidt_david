<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            box-sizing: border-box;
        }
        .orange1, .orange2 { background-color: lightsalmon;}
        .green {background-color: greenyellow;}
        .blue { background-color: darkblue;}
        .grey1, .grey2, .grey3, .grey4 { background-color: #ccc;}

        .container {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .container div { height: 25vh; width: 25vw;}
        
    </style>
</head>
<body>
    <div class="container">
        <div class="orange1"></div>
        <div class="orange2"></div>
        <div class="green"></div>
        <div class="blue-container">
            <div class="blue"></div>
            <div class="blue"></div>
            <div class="blue"></div>
        </div>
        <div class="grey1"></div>
        <div class="grey2"></div>
        <div class="grey3"></div>
        <div class="grey4"></div>
    </div>
</body>
</html>
