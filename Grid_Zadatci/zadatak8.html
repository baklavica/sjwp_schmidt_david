<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 100px 100px 100px 100px 100px 100px;
            grid-template-rows: 100px 100px;
            gap: 5px;
        }
        .container div {padding: 40px; border-radius: 20%;}
        .container .a {
            background-color: #a9a9a9;
        }
        .container .b {
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="a">1</div>
        <div class="b">2</div>
        <div class="a">3</div>
        <div class="b">4</div>
        <div class="a">5</div>
        <div class="b">6</div>
        <div class="a">7</div>
        <div class="b">8</div>
        <div class="a">9</div>
        <div class="b">10</div>
        <div class="a">11</div>
        <div class="b">12</div>
    </div>
</body>
</html>
